name: Pipeline

on:
  schedule:
    # Every 6 hours: 06:00, 12:00, 18:00, 00:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - ingest
          - filter
          - scrape
          - cluster
          - analyze
          - synthesize
      edition:
        description: "Edition ID (leave empty for new edition)"
        type: string
        required: false
      force:
        description: "Force regenerate (skip cache)"
        type: boolean
        default: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Install Playwright browsers
        working-directory: pipeline
        run: npx playwright install chromium --with-deps

      - name: Run pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.stage }}" != "" ] && [ "${{ github.event.inputs.stage }}" != "all" ]; then
            ARGS="--stage ${{ github.event.inputs.stage }}"
          fi
          if [ -n "${{ github.event.inputs.edition }}" ]; then
            ARGS="$ARGS --edition ${{ github.event.inputs.edition }}"
          fi
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run pipeline -- $ARGS
